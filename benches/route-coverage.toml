schema = "tach-route-coverage-v1"
claim_scope = "Static producer and route declarations only; this is not runtime proof, which is separately collected and validated."

[route_contracts.three_timer_direct]
description = "Every public timer has a selected direct route for now and now plus elapsed."

[route_contracts.three_timer_direct.instant]
public = "tach"
selected = "direct_selected_wall"
operations = ["now", "elapsed"]
exact_candidate_identity = true
selection_metadata = "tach.selection"
metadata_fields = ["selected_provider", "selected_native_benchmark", "eligible_direct_candidates"]

[route_contracts.three_timer_direct.ordered]
public = "tach_ordered"
selected = "direct_selected_ordered_wall"
operations = ["now", "elapsed"]
exact_candidate_identity = true
selection_metadata = "tach_ordered.wall_selection"
metadata_fields = ["selected_provider", "selected_native_benchmark", "eligible_direct_candidates"]

[route_contracts.three_timer_direct.thread_cpu]
public = "tach_thread_cpu"
selected = "direct_selected_thread_cpu"
operations = ["now", "elapsed"]
exact_candidate_identity = true
selection_metadata = "tach_thread_cpu.selection"
metadata_fields = ["selected_provider", "selected_mechanism", "selected_read_cost", "selected_native_benchmark", "eligible_direct_candidates"]

[selection_profile_contracts.wall_runtime_tournament]
selection_profile = "runtime_tournament"
validator = "wall_runtime_tournament_schema"
metadata_fields = ["selected_provider", "selected_native_benchmark", "eligible_direct_candidates", "probe"]

[selection_profile_contracts.wall_fixed_native]
selection_profile = "fixed_native"
validator = "wall_fixed_native_schema"
metadata_fields = ["selected_provider", "selected_native_benchmark", "eligible_direct_candidates", "fixed_provider"]

[selection_profile_contracts.thread_cpu_runtime_tournament]
selection_profile = "runtime_tournament"
validator = "validate_thread_cpu_selector"
selection_kinds = ["tournament_with_measured_runner_up"]
metadata_fields = ["selected_provider", "selected_mechanism", "selected_read_cost", "selected_native_benchmark", "eligible_direct_candidates", "native_entry_probe", "perf"]

[selection_profile_contracts.thread_cpu_fixed_native]
selection_profile = "fixed_native"
validator = "validate_fixed_native_thread_cpu_selector"
selection_kinds = ["fixed_native"]
metadata_fields = ["selection_kind", "selected_provider", "selected_mechanism", "selected_read_cost", "selected_native_benchmark", "eligible_direct_candidates", "fixed_provider", "read_cost_basis"]
forbidden_metadata = ["perf", "native_entry_probe", "failure_fallback"]

[selection_profile_contracts.thread_cpu_availability_fallback]
selection_profile = "availability_fallback"
validator = "availability_fallback_thread_cpu_schema"
selection_kinds = ["availability_fallback", "fixed_windows_thread_times"]
metadata_fields = ["selected_provider", "selected_mechanism", "selected_read_cost", "selected_native_benchmark", "eligible_direct_candidates", "failure_fallback"]

[selection_profile_contracts.thread_cpu_fallback_only]
selection_profile = "fallback_only"
validator = "fallback_only_thread_cpu_schema"
selection_kinds = ["fallback_only"]
metadata_fields = ["selected_provider", "selected_mechanism", "selected_read_cost", "selected_native_benchmark", "eligible_direct_candidates", "time_domain"]

