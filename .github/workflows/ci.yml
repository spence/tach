name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: 1

jobs:
  native:
    name: native / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-x86_64
            runner: macos-15-intel
          - name: macos-aarch64
            runner: macos-15
          - name: windows-x86_64
            runner: windows-2025
          - name: windows-aarch64
            runner: windows-11-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test library and integration tests
        run: cargo test --lib --tests

      - name: Test release library
        if: startsWith(matrix.name, 'linux-')
        run: cargo test --release --lib

      - name: Test docs
        run: cargo test --doc

      - name: Check examples
        run: cargo check --examples

      - name: Run basic example
        run: cargo run --example basic --release

      # M2.G1 inline parity: paired public/exact reads within max(1 ns, 5%) for
      # every converted wall family runnable in CI. FreeBSD has no hosted runner
      # and is out of scope here. Apple (macos-*) is verified locally, not here.
      - name: Measure inline parity probes
        if: contains(fromJSON('["linux-x86_64", "linux-aarch64", "windows-x86_64", "windows-aarch64"]'), matrix.name)
        run: cargo bench --bench instant --features bench-internal -- 'zzz_no_match'

      - name: Validate inline parity (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: python3 benches/check-inline-parity.py target/criterion/linux-x86-wall-selection.json

      - name: Validate inline parity (Linux aarch64)
        if: matrix.name == 'linux-aarch64'
        run: python3 benches/check-inline-parity.py target/criterion/linux-aarch64-wall-selection.json

      - name: Validate inline parity (Windows)
        if: matrix.name == 'windows-x86_64' || matrix.name == 'windows-aarch64'
        run: python benches/check-inline-parity.py target/criterion/windows-wall-selection.json

  benchmark-check:
    name: benchmark check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check benchmarks
        run: cargo check --benches

  provider-proof:
    name: 24-target provider proof
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Verify all clock routes
        run: python3 benches/verify-target-providers.py --install-targets

  msrv:
    name: MSRV 1.95
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup target add \
            powerpc64-unknown-linux-gnu \
            powerpc64le-unknown-linux-gnu \
            --toolchain 1.95.0

      - name: Test default features
        run: |
          cargo +1.95.0 test --lib --tests --locked
          cargo +1.95.0 test --doc --locked

      - name: Test no-default features
        run: |
          cargo +1.95.0 test --lib --tests --no-default-features --locked
          cargo +1.95.0 test --doc --no-default-features --locked

      - name: Check PowerPC64 provider at the MSRV
        env:
          RUSTFLAGS: -D warnings
        run: |
          cargo +1.95.0 check --locked --lib --target powerpc64-unknown-linux-gnu
          cargo +1.95.0 check --locked --lib --target powerpc64-unknown-linux-gnu --no-default-features
          cargo +1.95.0 check --locked --lib --target powerpc64le-unknown-linux-gnu
          cargo +1.95.0 check --locked --lib --target powerpc64le-unknown-linux-gnu --no-default-features

  package-check:
    name: crate package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build the published archive
        run: cargo +stable package --locked

  cross-check:
    name: cross-check / ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - i686-pc-windows-msvc
          - aarch64-unknown-linux-gnu
          - aarch64-pc-windows-msvc
          - s390x-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - wasm32-unknown-unknown
          - wasm32-wasip1
          - wasm32-wasip2
          - wasm32-unknown-emscripten
          - wasm32-wasip1-threads
          - wasm32v1-none

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Check target
        run: cargo check --lib --target ${{ matrix.target }}
