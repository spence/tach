name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: 1

jobs:
  native:
    name: native / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-x86_64
            runner: macos-15-intel
          - name: macos-aarch64
            runner: macos-15
          - name: windows-x86_64
            runner: windows-2025
          - name: windows-aarch64
            runner: windows-11-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test library and integration tests
        run: cargo test --lib --tests

      - name: Test release library
        if: startsWith(matrix.name, 'linux-')
        run: cargo test --release --lib

      - name: Test docs
        run: cargo test --doc

      - name: Check examples
        run: cargo check --examples

      - name: Run basic example
        run: cargo run --example basic --release

  benchmark-check:
    name: benchmark check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check benchmarks
        run: cargo check --benches

  provider-proof:
    name: 24-target provider proof
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Verify all clock routes
        run: python3 benches/verify-target-providers.py --install-targets

  claim-evidence:
    name: retained release claim evidence
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install raster renderer
        run: |
          sudo apt-get update
          sudo apt-get install --yes librsvg2-bin
          rsvg-convert --version | head -n 1 | grep -Fx 'rsvg-convert version 2.58.0'

      - name: Test evidence rules
        run: python3 -m unittest discover -s benches -p 'test_*.py'

      - name: Validate and regenerate evidence
        run: |
          evidence=docs/evidence/timers/release-speed-closure-2026-07-14
          scratch="$RUNNER_TEMP/tach-release-evidence"
          mkdir -p "$scratch"
          (cd "$evidence" && sha256sum -c SHA256SUMS)
          cp "$evidence"/speed*.json "$evidence"/route-observations-v1.json "$scratch"/
          tar -xzf "$evidence/collector-bundles.tgz" -C "$scratch"
          python3 benches/validate-speed-evidence.py \
            --data-dir "$scratch" \
            --output "$RUNNER_TEMP/tach-release-report.json"
          python3 benches/summary-use-cases.py \
            --data-dir "$scratch" \
            --output-dir benches
          python3 benches/summary-thread-cpu.py \
            --data-dir "$scratch" \
            --output-dir benches

      - name: Require checked-in evidence to match
        run: |
          git diff --exit-code -- \
            benches/summary-use-cases.png \
            benches/summary-use-cases-wide.png \
            benches/summary-use-cases.svg \
            benches/summary-use-cases-wide.svg \
            benches/summary-thread-cpu.png \
            benches/summary-thread-cpu-wide.png \
            benches/summary-thread-cpu.svg \
            benches/summary-thread-cpu-wide.svg

      - name: Upload mismatched release charts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-claim-charts
          path: |
            benches/summary-use-cases.png
            benches/summary-use-cases-wide.png
            benches/summary-use-cases.svg
            benches/summary-use-cases-wide.svg
            benches/summary-thread-cpu.png
            benches/summary-thread-cpu-wide.png
            benches/summary-thread-cpu.svg
            benches/summary-thread-cpu-wide.svg
          if-no-files-found: error
          retention-days: 1

  msrv:
    name: MSRV 1.95
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup target add \
            powerpc64-unknown-linux-gnu \
            powerpc64le-unknown-linux-gnu \
            --toolchain 1.95.0

      - name: Test default features
        run: |
          cargo +1.95.0 test --lib --tests --locked
          cargo +1.95.0 test --doc --locked

      - name: Test no-default features
        run: |
          cargo +1.95.0 test --lib --tests --no-default-features --locked
          cargo +1.95.0 test --doc --no-default-features --locked

      - name: Check PowerPC64 provider at the MSRV
        env:
          RUSTFLAGS: -D warnings
        run: |
          cargo +1.95.0 check --locked --lib --target powerpc64-unknown-linux-gnu
          cargo +1.95.0 check --locked --lib --target powerpc64-unknown-linux-gnu --no-default-features
          cargo +1.95.0 check --locked --lib --target powerpc64le-unknown-linux-gnu
          cargo +1.95.0 check --locked --lib --target powerpc64le-unknown-linux-gnu --no-default-features

  package-check:
    name: crate package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build the published archive
        run: cargo +stable package --locked

  cross-check:
    name: cross-check / ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - i686-pc-windows-msvc
          - aarch64-unknown-linux-gnu
          - aarch64-pc-windows-msvc
          - s390x-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - wasm32-unknown-unknown
          - wasm32-wasip1
          - wasm32-wasip2
          - wasm32-unknown-emscripten
          - wasm32-wasip1-threads
          - wasm32v1-none

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Check target
        run: cargo check --lib --target ${{ matrix.target }}
