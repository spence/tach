name: hosted speed evidence

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TACH_FREEZE_SHA: ${{ github.sha }}

jobs:
  windows-campaign-cell:
    name: Windows 2025 canonical cell
    runs-on: windows-2025
    env:
      CARGO_TARGET_DIR: target/windows-x86_64
      TACH_BENCH_EVIDENCE: "1"
      TACH_BENCH_SOURCE_REVISION: ${{ github.sha }}
      TACH_BENCH_RUNNER: github-windows-2025-x86_64
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TACH_FREEZE_SHA }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --release --tests --features bench-internal
      - name: Run source-sealed canonical benchmark
        shell: bash
        run: |
          python benches/seal-speed-source.py "$CARGO_TARGET_DIR/criterion" -- \
            cargo bench --locked --bench instant --features bench-internal -- \
              --warm-up-time 1 --measurement-time 3
      - name: Retain and compose canonical Windows campaign cell
        shell: bash
        run: |
          source_revision="$(bash benches/require-clean-benchmark-source.sh)"
          test "$source_revision" = "$TACH_FREEZE_SHA"
          output_dir=hosted-speed-windows-2025-x86_64
          bundle="$output_dir/speed-4-windows.collector.bundle"
          mkdir -p "$output_dir"
          python benches/collect-speed-bundle.py "$CARGO_TARGET_DIR/criterion" "$bundle"
          python benches/compose-speed.py "$output_dir/speed-4-windows.json" \
            --collector-bundle "$bundle"
      - name: Upload immutable Windows campaign cell
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tach-speed-windows-2025-${{ env.TACH_FREEZE_SHA }}
          path: hosted-speed-windows-2025-x86_64
          if-no-files-found: error
          retention-days: 90

  windows-i686-supplemental:
    name: Windows 2025 i686 supplemental
    runs-on: windows-2025
    env:
      CARGO_TARGET_DIR: target/windows-i686
      TACH_BENCH_EVIDENCE: "1"
      TACH_BENCH_SOURCE_REVISION: ${{ github.sha }}
      TACH_BENCH_RUNNER: github-windows-2025-i686
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TACH_FREEZE_SHA }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add i686-pc-windows-msvc
      - run: cargo test --locked --release --tests --features bench-internal --target i686-pc-windows-msvc
      - name: Run source-sealed i686 benchmark
        shell: bash
        run: |
          python benches/seal-speed-source.py "$CARGO_TARGET_DIR/criterion" -- \
            cargo bench --locked --bench instant --features bench-internal \
              --target i686-pc-windows-msvc -- \
              --warm-up-time 1 --measurement-time 3
      - name: Retain and compose supplemental i686 Windows evidence
        shell: bash
        run: |
          source_revision="$(bash benches/require-clean-benchmark-source.sh)"
          test "$source_revision" = "$TACH_FREEZE_SHA"
          output_dir=hosted-speed-windows-2025-i686
          artifact=speed-supplemental-windows-i686.json
          bundle="$output_dir/speed-supplemental-windows-i686.collector.bundle"
          mkdir -p "$output_dir"
          python benches/collect-speed-bundle.py "$CARGO_TARGET_DIR/criterion" "$bundle"
          python benches/compose-supplemental-speed.py \
            --artifact "$artifact" \
            --output "$output_dir/$artifact" \
            --source-revision "$source_revision" \
            --collector-bundle "$bundle" \
            --instant-profile fixed_native \
            --ordered-profile fixed_native \
            --thread-cpu-profile availability_fallback
      - name: Upload immutable i686 Windows evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tach-speed-windows-2025-i686-${{ env.TACH_FREEZE_SHA }}
          path: hosted-speed-windows-2025-i686
          if-no-files-found: error
          retention-days: 90

  windows-arm64-supplemental:
    name: Windows 11 Arm64 supplemental
    runs-on: windows-11-arm
    env:
      CARGO_TARGET_DIR: target/windows-arm64
      TACH_BENCH_EVIDENCE: "1"
      TACH_BENCH_SOURCE_REVISION: ${{ github.sha }}
      TACH_BENCH_RUNNER: github-windows-11-arm64
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TACH_FREEZE_SHA }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-pc-windows-msvc
      - run: cargo test --locked --release --tests --features bench-internal --target aarch64-pc-windows-msvc
      - name: Run source-sealed Arm64 benchmark
        shell: bash
        run: |
          python benches/seal-speed-source.py "$CARGO_TARGET_DIR/criterion" -- \
            cargo bench --locked --bench instant --features bench-internal \
              --target aarch64-pc-windows-msvc -- \
              --warm-up-time 1 --measurement-time 3
      - name: Retain and compose supplemental Arm64 Windows evidence
        shell: bash
        run: |
          source_revision="$(bash benches/require-clean-benchmark-source.sh)"
          test "$source_revision" = "$TACH_FREEZE_SHA"
          output_dir=hosted-speed-windows-11-arm64
          artifact=speed-supplemental-windows-aarch64.json
          bundle="$output_dir/speed-supplemental-windows-aarch64.collector.bundle"
          mkdir -p "$output_dir"
          python benches/collect-speed-bundle.py "$CARGO_TARGET_DIR/criterion" "$bundle"
          python benches/compose-supplemental-speed.py \
            --artifact "$artifact" \
            --output "$output_dir/$artifact" \
            --source-revision "$source_revision" \
            --collector-bundle "$bundle" \
            --instant-profile fixed_native \
            --ordered-profile fixed_native \
            --thread-cpu-profile availability_fallback
      - name: Upload immutable Arm64 Windows evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tach-speed-windows-11-arm64-${{ env.TACH_FREEZE_SHA }}
          path: hosted-speed-windows-11-arm64
          if-no-files-found: error
          retention-days: 90

  linux-i686-supplemental:
    name: Ubuntu 24.04 i686 supplemental
    runs-on: ubuntu-24.04
    env:
      CARGO_TARGET_DIR: target/linux-i686
      RUSTFLAGS: -D warnings
      TACH_BENCH_EVIDENCE: "1"
      TACH_BENCH_SOURCE_REVISION: ${{ github.sha }}
      TACH_BENCH_RUNNER: github-ubuntu-24-i686
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TACH_FREEZE_SHA }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add i686-unknown-linux-gnu
      - name: Install i686 system toolchain
        run: sudo apt-get update && sudo apt-get install --yes gcc-multilib libc6-dev-i386
      - run: cargo test --locked --release --tests --features bench-internal --target i686-unknown-linux-gnu
      - name: Run source-sealed i686 benchmark
        run: |
          python3 benches/seal-speed-source.py "$CARGO_TARGET_DIR/criterion" -- \
            cargo bench --locked --bench instant --features bench-internal \
              --target i686-unknown-linux-gnu -- \
              --warm-up-time 1 --measurement-time 3
      - name: Retain and compose supplemental i686 Linux evidence
        run: |
          source_revision="$(bash benches/require-clean-benchmark-source.sh)"
          test "$source_revision" = "$TACH_FREEZE_SHA"
          output_dir=hosted-speed-ubuntu-24-i686
          artifact=speed-supplemental-linux-i686.json
          bundle="$output_dir/speed-supplemental-linux-i686.collector.bundle"
          mkdir -p "$output_dir"
          python3 benches/collect-speed-bundle.py "$CARGO_TARGET_DIR/criterion" "$bundle"
          python3 benches/compose-supplemental-speed.py \
            --artifact "$artifact" \
            --output "$output_dir/$artifact" \
            --source-revision "$source_revision" \
            --collector-bundle "$bundle" \
            --instant-profile runtime_tournament \
            --ordered-profile runtime_tournament \
            --thread-cpu-profile runtime_tournament
      - name: Upload immutable i686 Linux evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tach-speed-ubuntu-24-i686-${{ env.TACH_FREEZE_SHA }}
          path: hosted-speed-ubuntu-24-i686
          if-no-files-found: error
          retention-days: 90

  macos-intel-supplemental:
    name: macOS 15 Intel supplemental
    runs-on: macos-15-intel
    env:
      CARGO_TARGET_DIR: target/macos-x86_64
      TACH_BENCH_EVIDENCE: "1"
      TACH_BENCH_SOURCE_REVISION: ${{ github.sha }}
      TACH_BENCH_RUNNER: github-macos-15-intel
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TACH_FREEZE_SHA }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --release --tests --features bench-internal
      - name: Run source-sealed Intel macOS benchmark
        run: |
          python3 benches/seal-speed-source.py "$CARGO_TARGET_DIR/criterion" -- \
            cargo bench --locked --bench instant --features bench-internal -- \
              --warm-up-time 1 --measurement-time 3
      - name: Retain and compose supplemental Intel macOS evidence
        shell: bash
        run: |
          source_revision="$(bash benches/require-clean-benchmark-source.sh)"
          test "$source_revision" = "$TACH_FREEZE_SHA"
          output_dir=hosted-speed-macos-15-intel
          artifact=speed-supplemental-macos-x86_64.json
          bundle="$output_dir/speed-supplemental-macos-x86_64.collector.bundle"
          mkdir -p "$output_dir"
          python3 benches/collect-speed-bundle.py "$CARGO_TARGET_DIR/criterion" "$bundle"
          python3 benches/compose-supplemental-speed.py \
            --artifact "$artifact" \
            --output "$output_dir/$artifact" \
            --source-revision "$source_revision" \
            --collector-bundle "$bundle" \
            --instant-profile runtime_tournament \
            --ordered-profile runtime_tournament \
            --thread-cpu-profile fixed_native
      - name: Upload immutable Intel macOS evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tach-speed-macos-15-intel-${{ env.TACH_FREEZE_SHA }}
          path: hosted-speed-macos-15-intel
          if-no-files-found: error
          retention-days: 90
