name: bench-speed-windows

# Runs the criterion speed bench on a Windows runner, extracts the six-clock
# medians, and commits benches/speed-4-windows.json back to the branch (via the
# built-in GITHUB_TOKEN) so the chart campaign can pull it without a local token.
on:
  push:
    branches: [bench/six-clock-speed]

permissions:
  contents: write

jobs:
  bench:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --bench instant -- --warm-up-time 1 --measurement-time 3
      - name: Extract + compose Windows cell
        shell: bash
        run: |
          python benches/extract_speed.py target/criterion > clocks.json
          python -c "import json; from pathlib import Path; c=json.loads(Path('clocks.json').read_text()); Path('benches/speed-4-windows.json').write_text(json.dumps({'title':'GitHub Windows','instance':'windows-2025','triple':'x86_64-pc-windows-msvc','order':4,'clocks':c}, indent=2)+'\n')"
          cat benches/speed-4-windows.json
      - name: Commit result back
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benches/speed-4-windows.json
          git commit -m "bench(speed): windows-2025 cell [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
